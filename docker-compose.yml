services:
  discovery-service:
    build: ./discovery-service
    container_name: order-platform-discovery
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - backend

  postgres:
    image: postgres:16
    container_name: order-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-userdb}
      POSTGRES_USER: ${DB_USERNAME:-postgres_user1234}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-passwordpostgres1234}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - backend

  redis:
    image: redis:7.2-alpine
    container_name: order-platform-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    networks:
      - backend

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: order-platform-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: order-platform-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - backend

  user-service:
    build: ./user-service
    restart: unless-stopped
    # Ports removed: Internal communication only, prevents host port conflicts when scaling
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/userdb
      - REDIS_HOST=redis
      - EUREKA_HOST=discovery-service
      - EUREKA_PORT=8761
    depends_on:
      - postgres
      - redis
      - discovery-service
    networks:
      - backend
    deploy:
      replicas: 3

  auth-service:
    build: ./auth-service
    restart: unless-stopped
    # Ports removed: Internal communication only
    environment:
      - REDIS_HOST=redis
      - EUREKA_HOST=discovery-service
      - EUREKA_PORT=8761
    depends_on:
      - redis
      - discovery-service
      - user-service
    networks:
      - backend
    deploy:
      replicas: 3

  store-service:
    build: ./store-service
    restart: unless-stopped
    # Ports removed: Internal communication only
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/storedb
      - REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_HOST=discovery-service
      - EUREKA_PORT=8761
    depends_on:
      - postgres
      - redis
      - kafka
      - discovery-service
    networks:
      - backend
    deploy:
      replicas: 3

  order-service:
    build: ./order-service
    restart: unless-stopped
    # Ports removed: Internal communication only
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/orderdb
      - REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_HOST=discovery-service
      - EUREKA_PORT=8761
    depends_on:
      - postgres
      - redis
      - kafka
      - discovery-service
      - store-service
    networks:
      - backend
    deploy:
      replicas: 3

  gateway-service:
    build: ./gateway-service
    container_name: order-platform-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - EUREKA_HOST=discovery-service
      - EUREKA_PORT=8761
      - JWT_SECRET=mySuperUltraSecureSecretKeyThatMustBeLongEnough123456
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
    depends_on:
      - discovery-service
      - redis  # Added redis to ensure gateway waits for it
    networks:
      - backend
    deploy:
      replicas: 1

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge