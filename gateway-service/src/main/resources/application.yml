server:
  port: ${GATEWAY_SERVICE_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: web-ui-static
          uri: lb://web-ui-service
          predicates:
            - Path=/assets/**,/webjars/**

        - id: web-ui-login
          uri: lb://web-ui-service
          predicates:
            - Path=/login
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        - id: web-ui-registration
          uri: lb://web-ui-service
          predicates:
            - Path=/register
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        - id: web-ui-checkout
          uri: lb://web-ui-service
          predicates:
            - Path=/app/checkout,/app/checkout/**
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 4
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@uiSessionKeyResolver}"

        - id: web-ui-service
          uri: lb://web-ui-service
          predicates:
            - Path=/,/login,/logout,/register,/app/**,/admin/**,/fragments/**,/error,/error/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@uiSessionKeyResolver}"

        - id: auth-login
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/login
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        - id: auth-refresh
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/refresh
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: user-registration
          uri: lb://user-service
          predicates:
            - Path=/api/users/register
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: store-service
          uri: lb://store-service
          predicates:
            - Path=/api/store/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      public-paths:
        - /api/auth/login
        - /api/auth/refresh
        - /api/users/register
        - /actuator/health
        - /actuator/health/**
        - /
        - /login
        - /logout
        - /register
        - /app/**
        - /admin/**
        - /fragments/**
        - /assets/**
        - /webjars/**
        - /error
        - /error/**
        - /swagger-ui/**
        - /v3/api-docs/**
        - /swagger-ui.html
        - /auth-service/swagger-ui/**
        - /auth-service/v3/api-docs/**
        - /auth-service/swagger-ui.html
        - /user-service/swagger-ui/**
        - /user-service/v3/api-docs/**
        - /user-service/swagger-ui.html
        - /store-service/swagger-ui/**
        - /store-service/v3/api-docs/**
        - /store-service/swagger-ui.html
        - /order-service/swagger-ui/**
        - /order-service/v3/api-docs/**
        - /order-service/swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
