server:
  port: 8081

spring:
  application:
    name: auth-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

services:
  user-service:
    url: http://localhost:8082
    internal-api-key: ${USER_SERVICE_INTERNAL_API_KEY:mySuperUltraSecureSecretKeyThatMustBeLongEnough123456}

app:
  security:
    jwt:
      secret: mySuperUltraSecureSecretKeyThatMustBeLongEnough123456
      expiration: 86400000
      public-paths:
        - /api/auth/login
        - /v3/api-docs/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /actuator/health
        - /api/auth/refresh
        - /api/auth/logout

logging:
  level:
    org.springframework.security: DEBUG
    com.orderprocessing.authservice.client.UserServiceClient: DEBUG