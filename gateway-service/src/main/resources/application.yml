server:
  port: ${GATEWAY_SERVICE_PORT:8080}

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10      # Tokens added per second
                redis-rate-limiter.burstCapacity: 20      # Maximum tokens allowed in a burst
                redis-rate-limiter.requestedTokens: 1     # Tokens consumed per request
                key-resolver: "#{@userKeyResolver}"       # References the bean created in Step 2

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: store-service
          uri: lb://store-service
          predicates:
            - Path=/api/store/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

app:
  security:
    jwt:
      secret: ${JWT_SECRET:mySuperUltraSecureSecretKeyThatMustBeLongEnough123456}
      public-paths:
        - /api/auth/login
        - /api/auth/refresh
        - /actuator/**
        - /swagger-ui/**
        - /v3/api-docs/**
        - /swagger-ui.html
        - /auth-service/swagger-ui/**
        - /auth-service/v3/api-docs/**
        - /auth-service/swagger-ui.html
        - /user-service/swagger-ui/**
        - /user-service/v3/api-docs/**
        - /user-service/swagger-ui.html
        - /store-service/swagger-ui/**
        - /store-service/v3/api-docs/**
        - /store-service/swagger-ui.html
        - /order-service/swagger-ui/**
        - /order-service/v3/api-docs/**
        - /order-service/swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: DEBUG