name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Java 21 reactor verification
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify all modules
        run: mvn -B -ntp clean verify
      - name: Validate Compose model
        run: docker compose --env-file .env.example config --quiet
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/**'
          if-no-files-found: ignore

  compose-smoke:
    name: Clean-clone Compose smoke test
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Build and start the complete platform
        run: docker compose --env-file .env.example up -d --build --wait --wait-timeout 360
      - name: Verify public health and sign-in page
        run: |
          curl --fail --silent --show-error http://localhost:8080/actuator/health
          curl --fail --silent --show-error http://localhost:8080/login | grep --quiet 'Sign in to order/flow'
      - name: Verify internal Prometheus exports
        run: |
          docker compose --env-file .env.example exec -T order-service sh -c \
            "curl --fail --silent http://localhost:8084/actuator/prometheus | grep --quiet order_platform_outbox_pending"
          docker compose --env-file .env.example exec -T store-service sh -c \
            "curl --fail --silent http://localhost:8083/actuator/prometheus | grep --quiet order_platform_inventory_reservations"
      - name: Capture service state
        if: always()
        run: docker compose --env-file .env.example ps
      - name: Capture failure logs
        if: failure()
        run: docker compose --env-file .env.example logs --no-color --tail=300
      - name: Stop the platform
        if: always()
        run: docker compose --env-file .env.example down --volumes --remove-orphans
