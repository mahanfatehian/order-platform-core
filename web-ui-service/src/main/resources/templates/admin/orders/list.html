<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/app}">
<section layout:fragment="content"><header class="page-heading"><div><p class="eyebrow">Saga supervision</p><h1>All orders</h1><p>Filter by lifecycle status or search an order or user identifier.</p></div></header><form class="filter-bar surface" method="get" th:action="@{/admin/orders}"><input class="form-control mono" type="search" name="search" th:value="${search}" placeholder="Order ID or user ID"><select class="form-select" name="status"><option value="">All statuses</option><option th:each="value : ${ {'PENDING','CONFIRMED','FAILED','CANCELLED'} }" th:value="${value}" th:text="${value}" th:selected="${status == value}"></option></select><button class="btn btn-primary" type="submit">Filter</button></form>
    <section class="surface table-responsive"><div th:if="${orders.content().isEmpty()}" th:replace="~{fragments/empty-state :: empty('bi-diagram-3','No matching orders','Change the status or identifier filter and try again.')}"></div><table th:if="${!orders.content().isEmpty()}" class="table data-table"><thead><tr><th>Order</th><th>User</th><th>Created</th><th>Total</th><th>Status</th><th></th></tr></thead><tbody><tr th:each="order : ${orders.content()}"><td data-label="Order" class="mono" th:text="${#strings.substring(order.id().toString(),0,8)}">id</td><td data-label="User" class="mono" th:text="${#strings.substring(order.userId().toString(),0,8)}">id</td><td data-label="Created" th:text="${#temporals.format(order.createdAt(),'MMM d, HH:mm')}">date</td><td data-label="Total" class="money" th:text="|$${#numbers.formatDecimal(order.totalAmount(),1,2)}|">$0</td><td data-label="Status"><span th:replace="~{fragments/status-badge :: order(${order.status()})}"></span></td><td data-label="Details"><a class="btn btn-sm btn-outline-primary" th:href="@{/admin/orders/{id}(id=${order.id()})}">Inspect</a></td></tr></tbody></table></section><div class="mt-3" th:replace="~{fragments/pagination :: pagination(${orders}, '/admin/orders')}"></div>
</section></html>
