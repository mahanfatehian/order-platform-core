<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/app}">
<section layout:fragment="content"><nav aria-label="Breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a th:href="@{/admin/users}">Users</a></li><li class="breadcrumb-item active" th:text="${managedUser.username()}">user</li></ol></nav><header class="page-heading"><div><p class="eyebrow">Managed identity</p><h1 th:text="${managedUser.displayName()}">User</h1><p><span class="mono" th:text="${managedUser.id()}">id</span></p></div></header>
    <div class="row g-3"><div class="col-lg-7"><section class="surface surface--padded"><h2 class="section-title">Account</h2><dl class="row mb-0"><dt class="col-sm-4">Username</dt><dd class="col-sm-8 mono" th:text="${managedUser.username()}">username</dd><dt class="col-sm-4">Email</dt><dd class="col-sm-8" th:text="${managedUser.email()}">email</dd><dt class="col-sm-4">State</dt><dd class="col-sm-8" th:text="${managedUser.enabled()} ? 'Active' : 'Disabled'">state</dd></dl><form class="mt-4" th:action="@{/admin/users/{id}/status(id=${managedUser.id()})}" method="post"><input type="hidden" name="enabled" th:value="${!managedUser.enabled()}"><button class="btn" th:classappend="${managedUser.enabled()} ? ' btn-outline-danger' : ' btn-primary'" type="submit" th:text="${managedUser.enabled()} ? 'Deactivate account' : 'Activate account'">Toggle</button></form></section></div>
    <div class="col-lg-5"><section class="surface surface--padded"><h2 class="section-title">Roles</h2><p class="small muted">Role changes revoke stale authorization according to the identity policy.</p><form th:action="@{/admin/users/{id}/roles(id=${managedUser.id()})}" method="post"><label class="form-check mb-2"><input class="form-check-input" type="checkbox" name="roles" value="USER" th:checked="${managedUser.roles().contains('USER') or managedUser.roles().contains('ROLE_USER')}"> Customer</label><label class="form-check mb-2"><input class="form-check-input" type="checkbox" name="roles" value="WAREHOUSE" th:checked="${managedUser.roles().contains('WAREHOUSE') or managedUser.roles().contains('ROLE_WAREHOUSE')}"> Warehouse operator</label><label class="form-check mb-2"><input class="form-check-input" type="checkbox" name="roles" value="DELIVERY" th:checked="${managedUser.roles().contains('DELIVERY') or managedUser.roles().contains('ROLE_DELIVERY')}"> Delivery operator</label><label class="form-check mb-3"><input class="form-check-input" type="checkbox" name="roles" value="ADMIN" th:checked="${managedUser.roles().contains('ADMIN') or managedUser.roles().contains('ROLE_ADMIN')}"> Administrator</label><button class="btn btn-primary" type="submit">Save roles</button></form></section></div></div>
</section></html>
