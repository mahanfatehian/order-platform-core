server:
  port: ${AUTH_SERVICE_PORT:8081}
  shutdown: graceful
spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: auth-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          enabled: true
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000
  cloud:
    openfeign:
      client:
        config:
          user-service:
            connectTimeout: 2000
            readTimeout: 3000
            loggerLevel: none

services:
  user-service:
    internal-api-key: ${USER_SERVICE_INTERNAL_API_KEY}

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: 3600000
      refresh-expiration: 604800000
      public-paths:
        - /api/auth/login
        - /api/auth/refresh
        - /swagger-ui/**
        - /v3/api-docs/**
        - /swagger-ui.html
        - /actuator/health
        - /actuator/health/**
        - /actuator/prometheus

logging:
  level:
    org.springframework.security: INFO
    com.orderprocessing.authservice.client.UserServiceClient: INFO

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
    healthcheck:
      enabled: true # Ensures Eureka only routes to healthy instances
  instance:
    prefer-ip-address: true # Crucial for Docker/multi-instance environments
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}} # Unique ID per instance
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
