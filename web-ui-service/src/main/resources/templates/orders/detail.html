<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/app}">
<section layout:fragment="content"><nav aria-label="Breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a th:href="@{/app/orders}">My orders</a></li><li class="breadcrumb-item active mono" th:text="${#strings.substring(order.id().toString(),0,8)}">id</li></ol></nav>
    <header class="page-heading"><div><p class="eyebrow">Order detail</p><h1 class="mono" th:text="${order.id()}">Order</h1><p th:text="|Created ${#temporals.format(order.createdAt(),'MMM d, yyyy HH:mm')}|">Created</p></div><form th:if="${order.cancellable()}" th:action="@{/app/orders/{id}/cancel(id=${order.id()})}" method="post"><button class="btn btn-outline-danger" type="submit">Cancel order</button></form></header>
    <div th:replace="~{orders/_status :: status}"></div>
    <section class="surface table-responsive mt-3"><table class="table data-table"><thead><tr><th>Product</th><th>Unit price</th><th>Quantity</th><th>Line total</th></tr></thead><tbody><tr th:each="item : ${order.items()}"><td data-label="Product"><strong th:text="${item.productName()}">Product</strong><span class="mono d-block muted" th:text="${item.productId()}">id</span></td><td data-label="Unit price" class="money" th:text="|$${#numbers.formatDecimal(item.unitPrice(),1,2)}|">$0</td><td data-label="Quantity" th:text="${item.quantity()}">1</td><td data-label="Line total" class="money" th:text="|$${#numbers.formatDecimal(item.effectiveLineTotal(),1,2)}|">$0</td></tr></tbody><tfoot><tr><td colspan="3" class="text-end fw-bold">Total</td><td class="money fs-5" th:text="|$${#numbers.formatDecimal(order.totalAmount(),1,2)}|">$0</td></tr></tfoot></table></section>
</section></html>
