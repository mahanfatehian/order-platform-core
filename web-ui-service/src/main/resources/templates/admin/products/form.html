<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/app}">
<section layout:fragment="content"><nav aria-label="Breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a th:href="@{/admin/products}">Products</a></li><li class="breadcrumb-item active" th:text="${editing} ? 'Edit' : 'New'">New</li></ol></nav><header class="page-heading"><div><p class="eyebrow">Catalog record</p><h1 th:text="${editing} ? 'Edit product' : 'Create product'">Product</h1><p>All fields are validated again by the store service.</p></div></header>
    <form class="surface surface--padded" th:action="${editing} ? @{/admin/products/{id}(id=${productId})} : @{/admin/products}" th:object="${productForm}" method="post" novalidate><div th:replace="~{fragments/form-errors :: errors(${productForm})}"></div><div class="row g-3"><div class="col-md-8"><label class="form-label" for="name">Name</label><input id="name" class="form-control" th:field="*{name}"><div class="field-error" th:errors="*{name}"></div></div><div class="col-md-4"><label class="form-label" for="sku">SKU</label><input id="sku" class="form-control mono" th:field="*{sku}"><div class="field-error" th:errors="*{sku}"></div></div><div class="col-12"><label class="form-label" for="description">Description</label><textarea id="description" class="form-control" rows="5" th:field="*{description}"></textarea><div class="field-error" th:errors="*{description}"></div></div><div class="col-md-4"><label class="form-label" for="price">Price</label><input id="price" class="form-control" type="number" min="0" step="0.01" th:field="*{price}"><div class="field-error" th:errors="*{price}"></div></div><div class="col-md-4"><label class="form-label" for="category">Category</label><select id="category" class="form-select" th:field="*{category}"><option value="ELECTRONICS">Electronics</option><option value="CLOTHING">Clothing</option><option value="HOME">Home</option><option value="BOOKS">Books</option><option value="OTHER">Other</option></select></div><div class="col-md-4 d-flex align-items-end"><label class="form-check mb-2"><input class="form-check-input" type="checkbox" th:field="*{active}"> Active in catalog</label></div></div><div class="mt-4 d-flex gap-2"><button class="btn btn-primary" type="submit" th:text="${editing} ? 'Save product' : 'Create product'">Save</button><a class="btn btn-quiet" th:href="@{/admin/products}">Cancel</a></div></form>
</section></html>
