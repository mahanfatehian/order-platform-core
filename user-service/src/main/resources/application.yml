server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:userdb}
    username: ${DB_USERNAME:app_user}
    password: ${DB_PASSWORD:app_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO

app:
  security:
    jwt:
      secret: mySuperUltraSecureSecretKeyThatMustBeLongEnough123456
      public-paths:
        - /swagger-ui/**
        - /v3/api-docs/**
      expiration: 3600000
