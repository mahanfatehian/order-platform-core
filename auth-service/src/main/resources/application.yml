server:
  port: 8081

spring:
  application:
    name: auth-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms

      # Lettuce connection pool
      lettuce:
        pool:
          enabled: true
          max-active: ${REDIS_POOL_MAX_ACTIVE:20}
          max-idle: ${REDIS_POOL_MAX_IDLE:10}
          min-idle: ${REDIS_POOL_MIN_IDLE:5}
          max-wait: ${REDIS_POOL_MAX_WAIT:2000}
          time-between-eviction-runs: 60000ms
        shutdown-timeout: 200ms

services:
  user-service:
    url: http://localhost:8082
    internal-api-key: ${USER_SERVICE_INTERNAL_API_KEY:mySuperUltraSecureSecretKeyThatMustBeLongEnough123456}

app:
  security:
    jwt:
      secret: mySuperUltraSecureSecretKeyThatMustBeLongEnough123456
      expiration: 86400000
      public-paths:
        - /api/auth/login
        - /v3/api-docs/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /actuator/health
        - /api/auth/refresh
        - /api/auth/logout

logging:
  level:
    org.springframework.security: DEBUG
    com.orderprocessing.authservice.client.UserServiceClient: DEBUG