server:
  port: 8083

spring:
  application:
    name: store-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://localhost:5432/storedb
    username: ${DB_USERNAME:postgres_user1234}
    password: ${DB_PASSWORD:passwordpostgres1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: StoreServiceHikariPool
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      auto-commit: true
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: store-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
    org.springframework.security: DEBUG

app:
  security:
    jwt:
      secret: mySuperUltraSecureSecretKeyThatMustBeLongEnough123456
      public-paths:
        - /swagger-ui/**
        - /v3/api-docs/**
        - /swagger-ui.html
      expiration: 3600000