<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/app}">
<section layout:fragment="content"><nav aria-label="Breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a th:href="@{/app/catalog}">Catalog</a></li><li class="breadcrumb-item active" th:text="${product.name()}">Product</li></ol></nav>
    <div class="row g-4"><div class="col-lg-8"><article class="surface surface--padded"><p class="eyebrow" th:text="|${product.category()} · ${product.sku() ?: 'NO SKU'}|">Category</p><h1 class="display-6 fw-bold" th:text="${product.name()}">Product</h1><p class="lead muted" th:text="${product.description() ?: 'No description is available for this product.'}">Description</p></article></div>
    <div class="col-lg-4"><aside class="surface surface--padded"><div class="money fs-3 mb-2" th:text="|$${#numbers.formatDecimal(product.price(),1,2)}|">$0</div><div class="availability mb-4" th:classappend="${!product.inStock()} ? ' availability--out'" th:text="${product.inStock()} ? |${product.availableQuantity()} currently available| : 'Not available to order'">Availability</div>
        <form th:if="${product.inStock()}" th:action="@{/app/cart/items}" th:object="${quantityForm}" method="post"><input type="hidden" name="productId" th:value="${product.id()}"><label class="form-label" for="quantity">Quantity</label><div class="input-group"><input id="quantity" class="form-control" type="number" min="1" th:max="${cartMaximumQuantity}" th:field="*{quantity}"><button class="btn btn-primary" type="submit"><i class="bi bi-bag-plus"></i> Add to cart</button></div><div class="form-text">Quantities above current availability create a pending order that may fail during inventory reservation.</div><div class="field-error" th:errors="*{quantity}"></div></form>
    </aside></div></div>
</section></html>
