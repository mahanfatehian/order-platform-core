<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/app}">
<section layout:fragment="content"><header class="page-heading"><div><p class="eyebrow">Account settings</p><h1 th:text="${profile.displayName()}">Profile</h1><p><span class="mono" th:text="${profile.username()}">username</span> · <span th:each="role : ${profile.roles()}" class="badge text-bg-light me-1" th:text="${role}">USER</span></p></div></header>
    <div class="row g-3"><div class="col-lg-6"><section class="surface surface--padded"><h2 class="section-title">Profile details</h2><form th:action="@{/app/profile}" th:object="${profileForm}" method="post" novalidate><div th:replace="~{fragments/form-errors :: errors(${profileForm})}"></div><div class="mb-3"><label class="form-label" for="email">Email</label><input id="email" class="form-control" type="email" th:field="*{email}" autocomplete="email"><div class="field-error" th:errors="*{email}"></div></div><div class="row g-3"><div class="col-sm-6"><label class="form-label" for="firstName">First name</label><input id="firstName" class="form-control" th:field="*{firstName}" autocomplete="given-name"></div><div class="col-sm-6"><label class="form-label" for="lastName">Last name</label><input id="lastName" class="form-control" th:field="*{lastName}" autocomplete="family-name"></div></div><button class="btn btn-primary mt-4" type="submit">Save profile</button></form></section></div>
    <div class="col-lg-6"><section class="surface surface--padded"><h2 class="section-title">Change password</h2><p class="small muted">Changing your password revokes other active tokens.</p><form th:action="@{/app/profile/change-password}" th:object="${changePasswordForm}" method="post" novalidate><div th:replace="~{fragments/form-errors :: errors(${changePasswordForm})}"></div><div class="mb-3"><label class="form-label" for="currentPassword">Current password</label><input id="currentPassword" name="currentPassword" class="form-control" type="password" autocomplete="current-password"><div class="field-error" th:errors="*{currentPassword}"></div></div><div class="mb-3"><label class="form-label" for="newPassword">New password</label><input id="newPassword" name="newPassword" class="form-control" type="password" autocomplete="new-password"><div class="field-error" th:errors="*{newPassword}"></div></div><div class="mb-3"><label class="form-label" for="confirmPassword">Confirm password</label><input id="confirmPassword" name="confirmPassword" class="form-control" type="password" autocomplete="new-password"><div class="field-error" th:errors="*{confirmPassword}"></div></div><button class="btn btn-outline-primary" type="submit">Change password</button></form></section></div></div>
    <section class="surface surface--padded mt-3 d-flex align-items-center justify-content-between gap-3"><div><h2 class="section-title mb-1">End this session</h2><p class="small muted mb-0">The access token is revoked server-side and the Redis session is removed.</p></div><form th:action="@{/logout}" method="post"><button class="btn btn-outline-danger" type="submit">Sign out</button></form></section>
</section></html>
