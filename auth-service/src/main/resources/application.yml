server:
  port: 8081

spring:
  application:
    name: auth-service

services:
  user-service:
    url: http://localhost:8082

app:
  security:
    jwt:
      secret: mySuperUltraSecureSecretKeyThatMustBeLongEnough123456
      expiration: 86400000

logging:
  level:
    org.springframework.security: DEBUG
    com.orderprocessing.authservice.client.UserServiceClient: DEBUG