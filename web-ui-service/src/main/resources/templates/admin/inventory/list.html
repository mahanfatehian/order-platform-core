<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/app}">
<section layout:fragment="content"><header class="page-heading"><div><p class="eyebrow">Concurrency-safe stock</p><h1>Inventory</h1><p>Total quantity cannot be set below currently reserved quantity.</p></div></header><form class="filter-bar surface" method="get" th:action="@{/admin/inventory}"><input class="form-control" type="search" name="q" th:value="${q}" placeholder="Search product or SKU"><button class="btn btn-primary" type="submit">Search</button></form>
    <section class="surface table-responsive"><table class="table data-table"><thead><tr><th>Product</th><th>Total</th><th>Reserved</th><th>Available</th><th>Last update</th><th>Set total</th></tr></thead><tbody><tr th:each="item : ${inventory.content()}"><td data-label="Product"><strong th:text="${item.productName()}">Product</strong><span class="mono d-block muted" th:text="${item.sku() ?: '—'}">SKU</span></td><td data-label="Total" th:text="${item.quantity()}">0</td><td data-label="Reserved" th:text="${item.reservedQuantity()}">0</td><td data-label="Available"><span class="fw-bold" th:classappend="${item.availableQuantity() <= 5} ? ' text-danger'" th:text="${item.availableQuantity()}">0</span></td><td data-label="Last update" th:text="${#temporals.format(item.lastUpdated(),'MMM d, HH:mm')}">date</td><td data-label="Set total"><form class="d-flex gap-2 justify-content-end" th:action="@{/admin/inventory/{id}(id=${item.productId()})}" method="post"><input class="form-control form-control-sm" style="width:6rem" type="number" name="quantity" min="0" th:value="${item.quantity()}"><button class="btn btn-sm btn-outline-primary" type="submit">Update</button></form></td></tr></tbody></table></section><div class="mt-3" th:replace="~{fragments/pagination :: pagination(${inventory}, '/admin/inventory')}"></div>
</section></html>
