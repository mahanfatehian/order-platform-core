<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/app}">
<section layout:fragment="content"><header class="page-heading"><div><p class="eyebrow">Catalog administration</p><h1>Products</h1><p>Customer visibility and pricing are enforced by store APIs.</p></div><a class="btn btn-primary" th:href="@{/admin/products/new}"><i class="bi bi-plus-lg"></i> New product</a></header>
    <form class="filter-bar surface" th:action="@{/admin/products}" method="get"><input class="form-control" type="search" name="q" th:value="${q}" placeholder="Search name or SKU"><button class="btn btn-primary" type="submit">Search</button></form>
    <section class="surface table-responsive"><div th:if="${products.content().isEmpty()}" th:replace="~{fragments/empty-state :: empty('bi-tags','No products found','Create a product or change the current search.')}"></div><table th:if="${!products.content().isEmpty()}" class="table data-table"><thead><tr><th>Name / SKU</th><th>Category</th><th>Price</th><th>Available</th><th>State</th><th></th></tr></thead><tbody><tr th:each="product : ${products.content()}"><td data-label="Name / SKU"><strong th:text="${product.name()}">Name</strong><span class="mono d-block muted" th:text="${product.sku() ?: '—'}">SKU</span></td><td data-label="Category" th:text="${product.category()}">OTHER</td><td data-label="Price" class="money" th:text="|$${#numbers.formatDecimal(product.price(),1,2)}|">$0</td><td data-label="Available" th:text="${product.availableQuantity()}">0</td><td data-label="State"><span class="status-badge" th:classappend="${product.active()} ? ' status-badge--confirmed' : ' status-badge--cancelled'" th:text="${product.active()} ? 'ACTIVE' : 'INACTIVE'">ACTIVE</span></td><td data-label="Actions"><div class="d-flex gap-1 justify-content-end"><a class="btn btn-sm btn-outline-primary" th:href="@{/admin/products/{id}/edit(id=${product.id()})}">Edit</a><form th:action="@{/admin/products/{id}/activation(id=${product.id()})}" method="post"><input type="hidden" name="active" th:value="${!product.active()}"><button class="btn btn-sm btn-quiet" type="submit" th:text="${product.active()} ? 'Deactivate' : 'Activate'">Toggle</button></form></div></td></tr></tbody></table></section><div class="mt-3" th:replace="~{fragments/pagination :: pagination(${products}, '/admin/products')}"></div>
</section></html>
