server:
  port: ${ORDER_SERVICE_PORT:8084}
  shutdown: graceful
spring:
  mvc:
    throw-exception-if-no-handler-found: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: order-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/orderdb
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: OrderServiceHikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: order-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.orderprocessing.kafkacommon.event
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  cloud:
    openfeign:
      client:
        config:
          store-service:
            connect-timeout: 2000
            read-timeout: 3000
            logger-level: basic

services:
  store-service:
    url: http://store-service:${STORE_SERVICE_PORT:8083}
    internal-api-key: ${STORE_SERVICE_INTERNAL_API_KEY}

outbox:
  polling:
    interval: ${ORDER_OUTBOX_POLL_INTERVAL:1000}
  batch-size: ${ORDER_OUTBOX_BATCH_SIZE:50}
  max-attempts: ${ORDER_OUTBOX_MAX_ATTEMPTS:5}

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: 3600000
      public-paths:
        - /swagger-ui/**
        - /v3/api-docs/**
        - /swagger-ui.html
        - /actuator/health
        - /actuator/health/**

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
    org.springframework.security: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
    healthcheck:
      enabled: true # Ensures Eureka only routes to healthy instances
  instance:
    prefer-ip-address: true # Crucial for Docker/multi-instance environments
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}} # Unique ID per instance
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json
