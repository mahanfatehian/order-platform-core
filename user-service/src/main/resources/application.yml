server:
  port: ${APP_PORT:8082}

spring:
  application:
    name: user-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:postgresdb1234}
    username: ${DB_USERNAME:postgres_user1234}
    password: ${DB_PASSWORD:passwordpostgres1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
    org.springframework.security: DEBUG

app:
  security:
    jwt:
      secret: mySuperUltraSecureSecretKeyThatMustBeLongEnough123456
      public-paths:
        - /swagger-ui/**
        - /v3/api-docs/**
        - /swagger-ui.html
      expiration: 3600000
    internal:
      api-key: ${USER_SERVICE_INTERNAL_API_KEY:mySuperUltraSecureSecretKeyThatMustBeLongEnough123456}
