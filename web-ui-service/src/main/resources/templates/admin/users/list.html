<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/app}">
<section layout:fragment="content"><header class="page-heading"><div><p class="eyebrow">Identity administration</p><h1>Users</h1><p>Account state and roles are enforced by backend authorization.</p></div></header><form class="filter-bar surface" method="get" th:action="@{/admin/users}"><label class="visually-hidden" for="user-search">Search users</label><input id="user-search" class="form-control" type="search" name="search" th:value="${search}" placeholder="Search username or email"><button class="btn btn-primary" type="submit">Search</button></form>
    <section class="surface table-responsive"><table class="table data-table"><thead><tr><th>User</th><th>Email</th><th>Roles</th><th>State</th><th>Created</th><th></th></tr></thead><tbody><tr th:each="user : ${users.content()}"><td data-label="User"><strong th:text="${user.displayName()}">Name</strong><span class="mono d-block muted" th:text="${user.username()}">username</span></td><td data-label="Email" th:text="${user.email()}">email</td><td data-label="Roles"><span class="badge text-bg-light me-1" th:each="role : ${user.roles()}" th:text="${role}">USER</span></td><td data-label="State"><span class="status-badge" th:classappend="${user.enabled()} ? ' status-badge--confirmed' : ' status-badge--cancelled'" th:text="${user.enabled()} ? 'ACTIVE' : 'DISABLED'">ACTIVE</span></td><td data-label="Created" th:text="${#temporals.format(user.createdAt(),'MMM d, yyyy')}">date</td><td data-label="Manage"><a class="btn btn-sm btn-outline-primary" th:href="@{/admin/users/{id}(id=${user.id()})}">Manage</a></td></tr></tbody></table></section><div class="mt-3" th:replace="~{fragments/pagination :: pagination(${users}, ${userPagination}, 'User administration pages')}"></div>
</section></html>
