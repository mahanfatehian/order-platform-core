<div id="cart-content" th:fragment="content" xmlns:th="http://www.thymeleaf.org">
    <div th:if="${cart.items().isEmpty()}" class="surface" th:replace="~{fragments/empty-state :: empty('bi-bag','Your cart is empty','Browse the catalog and add a product to begin an order.')}"></div>
    <div th:if="${!cart.items().isEmpty()}" class="row g-3">
        <div class="col-xl-8"><section class="surface table-responsive"><table class="table data-table"><thead><tr><th>Product</th><th>Price</th><th>Quantity</th><th>Subtotal</th><th></th></tr></thead><tbody>
            <tr th:each="item : ${cart.items()}"><td data-label="Product"><strong th:text="${item.name()}">Product</strong><span class="availability d-block mt-1" th:classappend="${!item.available()} ? ' availability--out'" th:text="${item.available()} ? |${item.availableQuantity()} available| : 'Quantity unavailable'">Available</span></td><td data-label="Price" class="money" th:text="|$${#numbers.formatDecimal(item.unitPrice(),1,2)}|">$0</td>
                <td data-label="Quantity"><form class="d-flex gap-2 justify-content-end justify-content-md-start" th:action="@{/app/cart/items/{id}/quantity(id=${item.productId()})}" method="post" th:attr="hx-post=@{/app/cart/items/{id}/quantity(id=${item.productId()})}" hx-target="#cart-content" hx-swap="outerHTML"><input class="form-control form-control-sm" style="width:5rem" type="number" name="quantity" min="1" th:max="${cartMaximumQuantity}" th:value="${item.requestedQuantity()}"><button class="btn btn-sm btn-outline-primary" type="submit">Update</button></form></td>
                <td data-label="Subtotal" class="money" th:text="|$${#numbers.formatDecimal(item.subtotal(),1,2)}|">$0</td><td data-label="Remove"><form th:action="@{/app/cart/items/{id}/remove(id=${item.productId()})}" method="post" th:attr="hx-post=@{/app/cart/items/{id}/remove(id=${item.productId()})}" hx-target="#cart-content" hx-swap="outerHTML"><button class="btn btn-sm btn-outline-danger" type="submit" aria-label="Remove item"><i class="bi bi-trash"></i></button></form></td></tr>
        </tbody></table></section></div>
        <div class="col-xl-4"><aside class="surface surface--padded"><h2 class="section-title">Order estimate</h2><div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3"><span class="muted">Current total</span><strong class="money fs-4" th:text="|$${#numbers.formatDecimal(cart.total(),1,2)}|">$0</strong></div><div th:if="${cart.hasAvailabilityWarnings()}" class="alert alert-warning small"><i class="bi bi-exclamation-triangle"></i> Requested quantity exceeds current availability. You may continue; inventory processing can mark the order failed.</div><p class="small muted">The order service validates current prices again when you place the order.</p><a class="btn btn-primary w-100" th:classappend="${!cart.checkoutReady()} ? ' disabled'" th:href="@{/app/checkout}">Review checkout <i class="bi bi-arrow-right"></i></a><form class="mt-2" th:action="@{/app/cart/clear}" method="post" th:attr="hx-post=@{/app/cart/clear}" hx-target="#cart-content" hx-swap="outerHTML"><button class="btn btn-quiet w-100" type="submit">Clear cart</button></form></aside></div>
    </div>
</div>
