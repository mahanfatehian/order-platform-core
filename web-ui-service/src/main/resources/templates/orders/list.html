<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/app}">
<section layout:fragment="content"><header class="page-heading"><div><p class="eyebrow">Order history</p><h1>My orders</h1><p>Only orders owned by your authenticated user are shown.</p></div><a class="btn btn-primary" th:href="@{/app/catalog}">Start an order</a></header>
    <section class="surface table-responsive"><th:block th:if="${orders.content().isEmpty()}"><div th:replace="~{fragments/empty-state :: empty('bi-receipt','No orders yet','Place an order from the catalog and follow its inventory status here.')}"></div></th:block>
        <table th:if="${!orders.content().isEmpty()}" class="table data-table"><thead><tr><th>Order ID</th><th>Created</th><th>Items</th><th>Total</th><th>Status</th><th></th></tr></thead><tbody><tr th:each="order : ${orders.content()}"><td data-label="Order ID" class="mono" th:text="${#strings.substring(order.id().toString(),0,8)}">id</td><td data-label="Created" th:text="${#temporals.format(order.createdAt(),'MMM d, yyyy HH:mm')}">date</td><td data-label="Items" th:text="${order.itemCount()}">1</td><td data-label="Total" class="money" th:text="|$${#numbers.formatDecimal(order.totalAmount(),1,2)}|">$0</td><td data-label="Status"><span th:replace="~{fragments/status-badge :: order(${order.status()})}"></span></td><td data-label="Details"><a class="btn btn-sm btn-outline-primary" th:href="@{/app/orders/{id}(id=${order.id()})}">View</a></td></tr></tbody></table>
    </section><div class="mt-3" th:replace="~{fragments/pagination :: pagination(${orders}, ${orderPagination}, 'Order history pages')}"></div>
</section></html>
