<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/app}">
<section layout:fragment="content"><nav aria-label="Breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a th:href="@{/admin/orders}">All orders</a></li><li class="breadcrumb-item active mono" th:text="${#strings.substring(order.id().toString(),0,8)}">id</li></ol></nav><header class="page-heading"><div><p class="eyebrow">Administrative order detail</p><h1 class="mono" th:text="${order.id()}">Order</h1><p>Customer <span class="mono" th:text="${order.userId()}">user</span></p></div><form th:if="${order.cancellable()}" th:action="@{/admin/orders/{id}/cancel(id=${order.id()})}" method="post"><button class="btn btn-outline-danger" type="submit">Cancel order</button></form></header><div th:replace="~{orders/_status :: status}"></div><section class="surface table-responsive mt-3"><table class="table data-table"><thead><tr><th>Product</th><th>Price</th><th>Qty</th><th>Total</th></tr></thead><tbody><tr th:each="item : ${order.items()}"><td data-label="Product"><strong th:text="${item.productName()}">Product</strong><span class="mono d-block muted" th:text="${item.productId()}">id</span></td><td data-label="Price" class="money" th:text="|$${#numbers.formatDecimal(item.unitPrice(),1,2)}|">$0</td><td data-label="Qty" th:text="${item.quantity()}">1</td><td data-label="Total" class="money" th:text="|$${#numbers.formatDecimal(item.effectiveLineTotal(),1,2)}|">$0</td></tr></tbody></table></section></section></html>
