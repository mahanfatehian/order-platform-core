server:
  port: ${ORDER_SERVICE_PORT:8084}

spring:
  application:
    name: order-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/orderdb
    username: ${DB_USERNAME:postgres_user1234}
    password: ${DB_PASSWORD:passwordpostgres1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: OrderServiceHikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

services:
  store-service:
    url: http://localhost:${STORE_SERVICE_PORT:8083}
    internal-api-key: ${STORE_SERVICE_INTERNAL_API_KEY:StoreInternalKey_SuperSecret_987654}

outbox:
  polling:
    interval: 5000

app:
  security:
    jwt:
      secret: mySuperUltraSecureSecretKeyThatMustBeLongEnough123456
      expiration: 3600000
      public-paths:
        - /swagger-ui/**
        - /v3/api-docs/**
        - /swagger-ui.html

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
    org.springframework.security: DEBUG


springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json