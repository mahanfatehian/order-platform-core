services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-userdb}
      POSTGRES_USER: ${DB_USERNAME:?Set DB_USERNAME in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=\"$${POSTGRES_USER}\" --dbname=\"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - backend

  database-init:
    image: postgres:16
    restart: "no"
    environment:
      PGPASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - psql
      - --host=postgres
      - --username=${DB_USERNAME:?Set DB_USERNAME in .env}
      - --dbname=postgres
      - --set=ON_ERROR_STOP=1
      - --file=/init/init-multiple-dbs.sql
    volumes:
      - ./init-scripts/init-multiple-dbs.sql:/init/init-multiple-dbs.sql:ro
    networks:
      - backend

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["/bin/sh", "-c", "exec redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      - backend

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost 2181"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 10s
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 20s
    networks:
      - backend

  discovery-service:
    build:
      context: .
      dockerfile: discovery-service/Dockerfile
    restart: "on-failure:3"
    init: true
    environment:
      DISCOVERY_SERVICE_PORT: ${DISCOVERY_SERVICE_PORT:-8761}
      EUREKA_INSTANCE_HOSTNAME: discovery-service
    ports:
      - "${DISCOVERY_SERVICE_PORT:-8761}:${DISCOVERY_SERVICE_PORT:-8761}"
    expose:
      - "${DISCOVERY_SERVICE_PORT:-8761}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${DISCOVERY_SERVICE_PORT}/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    stop_grace_period: 40s
    networks:
      - backend

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    restart: "on-failure:3"
    init: true
    environment:
      USER_SERVICE_PORT: ${USER_SERVICE_PORT:-8082}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userdb
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME in .env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      EUREKA_HOST: discovery-service
      EUREKA_PORT: ${DISCOVERY_SERVICE_PORT:-8761}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      USER_SERVICE_INTERNAL_API_KEY: ${USER_SERVICE_INTERNAL_API_KEY:?Set USER_SERVICE_INTERNAL_API_KEY in .env}
    expose:
      - "${USER_SERVICE_PORT:-8082}"
    depends_on:
      database-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${USER_SERVICE_PORT}/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s
    stop_grace_period: 40s
    networks:
      - backend

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    restart: "on-failure:3"
    init: true
    environment:
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT:-8081}
      USER_SERVICE_PORT: ${USER_SERVICE_PORT:-8082}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      EUREKA_HOST: discovery-service
      EUREKA_PORT: ${DISCOVERY_SERVICE_PORT:-8761}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      USER_SERVICE_INTERNAL_API_KEY: ${USER_SERVICE_INTERNAL_API_KEY:?Set USER_SERVICE_INTERNAL_API_KEY in .env}
    expose:
      - "${AUTH_SERVICE_PORT:-8081}"
    depends_on:
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${AUTH_SERVICE_PORT}/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s
    stop_grace_period: 40s
    networks:
      - backend

  store-service:
    build:
      context: .
      dockerfile: store-service/Dockerfile
    restart: "on-failure:3"
    init: true
    environment:
      STORE_SERVICE_PORT: ${STORE_SERVICE_PORT:-8083}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/storedb
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME in .env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_HOST: discovery-service
      EUREKA_PORT: ${DISCOVERY_SERVICE_PORT:-8761}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      STORE_SERVICE_INTERNAL_API_KEY: ${STORE_SERVICE_INTERNAL_API_KEY:?Set STORE_SERVICE_INTERNAL_API_KEY in .env}
    expose:
      - "${STORE_SERVICE_PORT:-8083}"
    depends_on:
      database-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${STORE_SERVICE_PORT}/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s
    stop_grace_period: 40s
    networks:
      - backend

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    restart: "on-failure:3"
    init: true
    environment:
      ORDER_SERVICE_PORT: ${ORDER_SERVICE_PORT:-8084}
      STORE_SERVICE_PORT: ${STORE_SERVICE_PORT:-8083}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderdb
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME in .env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_HOST: discovery-service
      EUREKA_PORT: ${DISCOVERY_SERVICE_PORT:-8761}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      STORE_SERVICE_INTERNAL_API_KEY: ${STORE_SERVICE_INTERNAL_API_KEY:?Set STORE_SERVICE_INTERNAL_API_KEY in .env}
    expose:
      - "${ORDER_SERVICE_PORT:-8084}"
    depends_on:
      database-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      store-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${ORDER_SERVICE_PORT}/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s
    stop_grace_period: 40s
    networks:
      - backend

  web-ui-service:
    build:
      context: .
      dockerfile: web-ui-service/Dockerfile
    restart: "on-failure:3"
    init: true
    environment:
      WEB_UI_SERVICE_PORT: ${WEB_UI_SERVICE_PORT:-8085}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      EUREKA_HOST: discovery-service
      EUREKA_PORT: ${DISCOVERY_SERVICE_PORT:-8761}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      THYMELEAF_CACHE: ${THYMELEAF_CACHE:-false}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      AUTH_SERVICE_URL: http://auth-service:${AUTH_SERVICE_PORT:-8081}
      USER_SERVICE_URL: http://user-service:${USER_SERVICE_PORT:-8082}
      STORE_SERVICE_URL: http://store-service:${STORE_SERVICE_PORT:-8083}
      ORDER_SERVICE_URL: http://order-service:${ORDER_SERVICE_PORT:-8084}
      STORE_SERVICE_INTERNAL_API_KEY: ${STORE_SERVICE_INTERNAL_API_KEY:?Set STORE_SERVICE_INTERNAL_API_KEY in .env}
    expose:
      - "${WEB_UI_SERVICE_PORT:-8085}"
    depends_on:
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      store-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${WEB_UI_SERVICE_PORT}/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s
    stop_grace_period: 40s
    networks:
      - backend

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    restart: "on-failure:3"
    init: true
    environment:
      GATEWAY_SERVICE_PORT: ${GATEWAY_SERVICE_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      EUREKA_HOST: discovery-service
      EUREKA_PORT: ${DISCOVERY_SERVICE_PORT:-8761}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      - "${GATEWAY_SERVICE_PORT:-8080}:${GATEWAY_SERVICE_PORT:-8080}"
    expose:
      - "${GATEWAY_SERVICE_PORT:-8080}"
    depends_on:
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      web-ui-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${GATEWAY_SERVICE_PORT}/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s
    stop_grace_period: 40s
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge
